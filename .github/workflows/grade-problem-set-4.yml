name: "Grade — Problem Set 4"

on:
    push:
        branches:
            - python/problem-set-4
    workflow_dispatch: # allows manual "Run workflow" from the Actions tab

permissions:
    contents: read

jobs:
    grade:
        name: "Grade Problem Set 4"
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install test dependencies
              run: pip install pytest pytest-github-actions-annotate-failures

            - name: "Problem 1 — Soldier Roster & Dispatch System"
              continue-on-error: true
              run: >
                  pytest .github/python_tests/test_problem_set_4.py::TestProcessReports
                  .github/python_tests/test_problem_set_4.py::TestShowAvailable
                  .github/python_tests/test_problem_set_4.py::TestDispatch
                  .github/python_tests/test_problem_set_4.py::TestFitnessReport
                  -v --tb=short --no-header --color=yes -s

            # - name: "Problem 2 — Recipe Ingredient Checker"
            #   continue-on-error: true
            #   run: >
            #       pytest .github/python_tests/test_problem_set_4.py::TestCanMake
            #       .github/python_tests/test_problem_set_4.py::TestMissingIngredients
            #       -v --tb=short --no-header --color=yes -s

            # - name: "Problem 3 — Song Lyric Word Counter"
            #   continue-on-error: true
            #   run: >
            #       pytest .github/python_tests/test_problem_set_4.py::TestWordCount
            #       -v --tb=short --no-header --color=yes -s

            - name: "Final grade — all tests must pass"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py
                  --tb=line --no-header --color=yes -q
