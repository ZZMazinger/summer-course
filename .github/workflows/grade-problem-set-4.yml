name: "Grade — Problem Set 4"

on:
    push:
        branches:
            - python/problem-set-4
    workflow_dispatch: # allows manual "Run workflow" from the Actions tab

permissions:
    contents: read

jobs:
    grade:
        name: "Grade Problem Set 4"
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install test dependencies
              run: pip install pytest pytest-github-actions-annotate-failures

            - name: "Run Problem Set 4 tests"
              run: >
                  pytest .github/python_tests/test_problem_set_4.py
                  -v --tb=short --no-header --color=yes
